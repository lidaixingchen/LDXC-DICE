  强化数值计算示例:
    F级武器(SPV5): 基础攻击力 = 0.6 × 5 = 3
    +1 强化: 3 × 1.2 = 3
    +2 强化: 3 × 1.4 = 4
    +3 强化: 3 × 1.6 = 4
    +4 强化: 3 × 1.8 = 5
    +5 强化: 3 × 2.0 = 6
