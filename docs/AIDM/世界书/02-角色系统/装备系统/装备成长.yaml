---
装备成长:
  说明: 装备可在乾坤界兑换中心进行强化，100%成功无风险，消耗与SPV挂钩

  强化规则:
    强化等级: 1~5级（显示为 +1 ~ +5）
    强化效果: 每级提升装备核心数值 +20%（基于基础数值，非累乘）
    消耗公式: 兑换点消耗 = 系数 × 装备阶位SPV

  阶位强化上限:
    F级: +1
    E级: +1
    D级: +2
    C级: +2
    B级: +3
    A级: +3
    S级: +4
    SS级: +4
    SSS级: +5

  强化消耗:
    +1:
      系数: 10
      兑换点: 10 × 装备阶位SPV
    +2:
      系数: 20
      兑换点: 20 × 装备阶位SPV
    +3:
      系数: 40
      兑换点: 40 × 装备阶位SPV
    +4:
      系数: 80
      兑换点: 80 × 装备阶位SPV
    +5:
      系数: 160
      兑换点: 160 × 装备阶位SPV

